title: 启动 [SaaS]{class="text-primary"} 以光速
description: 利用Nuxt UI强大的组件、身份验证流程和企业级功能，构建可投入生产使用的SaaS应用程序。整个Nuxt生态系统信赖的同一组件库。
seo:
  title: Nuxt SaaS 模板
  description: 使用 Nuxt UI 创建令人惊艳、快速且可投入生产的 SaaS 应用程序。100+ Vue 组件、身份验证、深色模式和基于 Tailwind CSS 的企业级功能。
navigation: false
hero:
  links:
    - label: 开始
      icon: i-lucide-arrow-right
      trailing: true
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
      size: xl
    - label: 使用此框架
      icon: i-simple-icons-github
      size: xl
      color: neutral
      variant: subtle
      to: https://github.com/nuxt-ui-templates/saas
      target: _blank
sections:
  - title: 由 Nuxt UI 组件驱动
    description: 访问完整的 Nuxt UI 组件库，包含 100+ 个样式精美、可访问且可定制的 Vue 组件。构建专业 SaaS 应用所需的一切。
    id: features
    orientation: horizontal
    features:
      - name: 100+ UI 组件
        description: 从按钮到模态框，数据表格到表单 - 全部采用 Tailwind CSS 样式，开箱即用的可访问性。
        icon: i-lucide-package
      - name: 身份验证就绪
        description: 预建的登录、注册和密码重置流程。只需连接后端即可开始用户引导。
        icon: i-lucide-shield
      - name: TypeScript 优先
        description: 全面的 TypeScript 支持，每个组件和组合式函数都具备自动补全、类型安全和智能提示。
        icon: i-lucide-code-2
  - title: 为现代 SaaS 而生
    description: 启动和扩展 SaaS 所需的一切。从精美的营销页面到复杂的仪表板，使用生产就绪的模式更快交付。
    orientation: horizontal
    reverse: true
    features:
      - name: 边缘性能
        description: 针对核心 Web 指标优化，具备自动代码分割、懒加载和 SSR/SSG 支持。
        icon: i-lucide-zap
      - name: 深色模式就绪
        description: 自动主题切换，过渡流畅。尊重系统偏好并记住用户选择。
        icon: i-lucide-moon
      - name: 全球化就绪
        description: 内置 i18n 支持，50+ 种语言，支持 RTL/LTR 布局，集成 @nuxt/fonts。
        icon: i-lucide-globe
features:
  title: 发布所需的一切
  description: 停止从头开始构建。专注于您的独特功能，而 Nuxt UI 通过久经验证的组件和模式处理基础工作。
  items:
    - title: 精美的设计系统
      description: 语义化颜色别名、全面的设计令牌和 Tailwind Variants，实现一致且可定制的样式。
      icon: i-lucide-palette
    - title: 默认可访问
      description: 基于 Reka UI 构建，实现强大的可访问性。WCAG 合规的组件，适用于每个人、每个地方。
      icon: i-lucide-accessibility
    - title: 开发者体验
      description: 自动导入、热模块替换和全面的文档。减少摩擦，构建更快。
      icon: i-lucide-terminal
    - title: SEO 优化
      description: 服务器端渲染、自动元标签、站点地图生成和开箱即用的 Open Graph 图片。
      icon: i-lucide-search
    - title: 生产就绪
      description: 错误处理、加载状态、表单验证和安全最佳实践内置于每个组件中。
      icon: i-lucide-check-circle
    - title: 无限可定制
      description: 使用 ui prop 覆盖任何样式，使用 AppConfig 全局定制，或直接使用 Tailwind 类。
      icon: i-lucide-settings
testimonials:
  headline: 受开发者信赖
  title: 加入成千上万使用 Nuxt UI 构建的开发者
  description: 了解为什么开发者选择 Nuxt UI 更快、更自信地交付他们的 SaaS 应用。
  items:
    - quote: Nuxt UI 改变了我们的构建方式。组件质量卓越——一切都完美运行，具备完美的 TypeScript 支持、可访问性和内置深色模式。
      user:
        name: Sarah Chen
        description: TechScale Solutions CTO
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: 我们在 2 周内交付了 MVP，而不是 2 个月。身份验证流程和表单组件为我们节省了无数小时的开发时间。
      user:
        name: Marcus Rodriguez
        description: DataFlow 工程副总裁
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: 带有 AppConfig 的设计系统非常棒。我们在利用完整组件库的同时，在所有产品中保持品牌一致性。
      user:
        name: David Kumar
        description: SecureStack 安全总监
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: 开箱即用的完美 Lighthouse 分数。仅通过切换到 Nuxt UI 组件，我们的核心 Web 指标就显著提升。
      user:
        name: Emily Zhang
        description: ScaleForce 首席架构师
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: Tailwind Variants 系统让定制变得直观。我们可以在保持功能完整的同时覆盖任何组件样式。
      user:
        name: James Wilson
        description: CloudPro DevOps 负责人
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: 从 SaaS 模板到生产环境只需几天。预建的布局、导航和内容结构加速了我们的发布。
      user:
        name: Lisa Patel
        description: AutoScale CEO
        avatar:
          src: https://i.pravatar.cc/120?img=9
    - quote: Reka UI 基础意味着可访问性绝不是事后想法。我们无需任何定制工作就实现了 WCAG 合规。
      user:
        name: Michael Torres
        description: AccessFirst 前端负责人
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: 文档非常出色。每个组件都有清晰的示例，Discord 社区非常有帮助。
      user:
        name: Rachel Kim
        description: APIHub 性能工程师
        avatar:
          src: https://i.pravatar.cc/120?img=10
    - quote: 我们用 Nuxt UI 替换了三个不同的 UI 库。所有组件的一致性和质量无与伦比。
      user:
        name: Thomas Weber
        description: DesignScale UI 架构负责人
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: 与 Nuxt 模块的集成无缝。颜色模式、字体、图标——一切都完美协作。
      user:
        name: Sophia Martinez
        description: TechFlow 集成专家
        avatar:
          src: https://i.pravatar.cc/120?img=14
cta:
  title: 准备好构建出色的 SaaS 了吗？
