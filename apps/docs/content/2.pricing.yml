faq:
  title: 常见问题
  description: 了解更多关于我们服务的详细信息。
  items:
    - label: 这项服务安全吗？
      content: 我们采用行业领先的安全措施来保护您的数据和隐私。
    - label: 如何取消订阅？
      content: 您可以随时在账户设置中取消订阅，或联系客服团队协助您取消。
    - label: 免费试用是如何运作的？
      content: 注册后即可享受免费试用，无需信用卡。试用期结束后您可以选择订阅。
    - label: 我可以更改方案吗？
      content: 可以，您可以随时升级到更高级的方案，降级将在下个计费周期生效。
    - label: 提供退款吗？
      content: 我们提供 30 天无条件退款保证。如果您不满意，可以随时申请退款。
    - label: 你们提供支持服务吗？
      content: 是的，我们为所有用户提供邮件支持，高级方案用户还可获得优先技术支持。
